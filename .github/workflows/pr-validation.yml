name: PR Validation

on:
  pull_request:
    branches: [ main ]

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  COVERAGE_THRESHOLD: 80

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET 10 SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore SquadCommerce.slnx

    - name: Build in Release mode
      run: dotnet build SquadCommerce.slnx --no-restore --configuration Release

    - name: Run tests with coverage
      run: |
        dotnet test SquadCommerce.slnx \
          --no-build \
          --configuration Release \
          --filter "FullyQualifiedName!~Playwright" \
          --collect:"XPlat Code Coverage" \
          --results-directory ./TestResults \
          -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover

    - name: Code Coverage Report
      uses: irongut/CodeCoverageSummary@v1.3.0
      with:
        filename: ./TestResults/**/coverage.cobertura.xml
        badge: true
        fail_below_min: true
        format: markdown
        hide_branch_rate: false
        hide_complexity: true
        indicators: true
        output: both
        thresholds: '${{ env.COVERAGE_THRESHOLD }} 90'

    - name: Add Coverage PR Comment
      uses: marocchino/sticky-pull-request-comment@v2
      if: github.event_name == 'pull_request'
      with:
        recreate: true
        path: code-coverage-results.md

    - name: Check code formatting
      run: |
        dotnet format SquadCommerce.slnx --verify-no-changes --verbosity diagnostic
      continue-on-error: true
      id: format-check

    - name: Format Check Summary
      if: steps.format-check.outcome == 'failure'
      run: |
        echo "⚠️ **Code formatting issues detected**" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Run \`dotnet format\` locally to fix formatting issues." >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
        echo "dotnet format SquadCommerce.slnx" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

    - name: Quality Gates Summary
      if: always()
      run: |
        echo "### Quality Gates Report 🔍" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Gate | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Build | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
        echo "| Tests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
        echo "| Coverage Threshold (≥${{ env.COVERAGE_THRESHOLD }}%) | ${{ steps.coverage.outcome == 'success' && '✅' || '⚠️' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Code Formatting | ${{ steps.format-check.outcome == 'success' && '✅' || '⚠️' }} |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Note:** Playwright tests are excluded from CI runs." >> $GITHUB_STEP_SUMMARY
