name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: 1

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET 10 SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore SquadCommerce.slnx

    - name: Build
      run: dotnet build SquadCommerce.slnx --no-restore --configuration Release

    - name: Run tests
      run: |
        dotnet test SquadCommerce.slnx \
          --no-build \
          --configuration Release \
          --filter "FullyQualifiedName!~Playwright" \
          --logger "trx;LogFileName=test-results.trx" \
          --collect:"XPlat Code Coverage" \
          --results-directory ./TestResults

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: ./TestResults/*.trx
        retention-days: 30

    - name: Upload code coverage
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: code-coverage
        path: ./TestResults/**/coverage.cobertura.xml
        retention-days: 30

    - name: Test Report
      uses: dorny/test-reporter@v1
      if: success() || failure()
      with:
        name: Test Results
        path: ./TestResults/*.trx
        reporter: dotnet-trx
        fail-on-error: true

  docker-build:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-and-test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build API Docker image
      run: |
        docker build \
          -f src/SquadCommerce.Api/Dockerfile \
          -t squad-commerce-api:latest \
          .

    - name: Build Web Docker image
      run: |
        docker build \
          -f src/SquadCommerce.Web/Dockerfile \
          -t squad-commerce-web:latest \
          .

    - name: Verify images built successfully
      run: |
        docker images | grep squad-commerce
        echo "✅ Docker images built successfully"
